spring.application.name=financeiro

# POSTGRES
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/financeiro}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

# JPA - Mude para validate assim que criarmos as migrations
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Segurança
api.security.token.secret=${API_SECURITY_TOKEN_SECRET:secret-desenvolvimento-trocar-em-producao}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true

# Flyway assume o controle
spring.flyway.enabled=true
# Se o banco já tiver dados, ele marca o estado atual como V1
spring.flyway.baseline-on-migrate=true 


