spring.application.name=financeiro

# POSTGRES - valores padr?o para dev local. Em produ??o, defina SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME e SPRING_DATASOURCE_PASSWORD.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/financeiro}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

# Configura??es do JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use valor padr?o em dev se API_SECURITY_TOKEN_SECRET n?o estiver definida. Em produ??o, defina a vari?vel de ambiente.
api.security.token.secret=${API_SECURITY_TOKEN_SECRET:secret-desenvolvimento-trocar-em-producao}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true